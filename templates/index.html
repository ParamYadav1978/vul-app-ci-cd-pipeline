<!DOCTYPE html>
<html>
<head>
    <title>Vulnerability Assessment App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #response {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <h1>🔐 Vulnerability Assessment Tool</h1>

    <input type="text" id="userInput" placeholder="Enter input">
    <br><br>
    <button onclick="sendData()">Analyze</button>

    <p id="response"></p>

    <script>
        function sendData() {
            let input = document.getElementById("userInput").value;

            fetch("http://127.0.0.1:5000/api", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ input: input })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("response").innerText = data.message;
            });
        }
    </script>

</body>
</html>
